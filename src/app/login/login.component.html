<div class="login-screen">
  <div class="login-top-actions">
    <app-language-switcher />
  </div>

  <app-hero-banner [config]="heroBannerConfig"></app-hero-banner>

  <app-contact-banner [config]="contactBannerConfig"></app-contact-banner>

  <div class="login-page">
    <div class="login-admin-notice" style="display: none">
      <div class="login-admin-notice-title">📢 <span>{{ 'LOGIN.ADMIN_NOTICE_TITLE' | translate }}</span></div>
      <div class="login-admin-notice-body"></div>
    </div>

    <div class="login-panel">
      <h2>{{ icons.LOGIN }} {{ 'LOGIN.TITLE' | translate }}</h2>
      <p class="login-subtitle">{{ 'LOGIN.SUBTITLE' | translate }}</p>

      <div class="login-form">
        <div class="login-form-group">
          <label>{{ 'LOGIN.LABEL_INPUT' | translate }} <span class="req">*</span></label>
          <div class="login-input-wrap">
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="loginInput"
              [placeholder]="'LOGIN.PLACEHOLDER_INPUT' | translate"
              class="login-input-field"
              (keydown)="onEnterKeyPress($event)"
              autocomplete="off" />
            <button
              type="button"
              class="login-password-toggle"
              (click)="togglePasswordVisibility()"
              [title]="'LOGIN.TOGGLE_PASSWORD_TITLE' | translate">
              {{ showPassword ? icons.HIDE : icons.SHOW }}
            </button>
          </div>
        </div>
        <button type="button" class="btn btn-g login-submit-btn" (click)="doLogin()">
          {{ icons.SUCCESS }} {{ 'LOGIN.BUTTON' | translate }}
        </button>
      </div>
    </div>
  </div>

  <app-footer-brand [config]="footerBrandConfig"></app-footer-brand>
</div>
