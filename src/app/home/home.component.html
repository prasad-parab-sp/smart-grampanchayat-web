<div>
  <h2 class="sec-title">{{ 'HOME.INFO_TITLE' | translate }}</h2>
  <div class="grid2 home-stats">
    <div class="stat-card" *ngFor="let s of stats">
      <div [ngClass]="statValueClass(s.valueModifier)">{{ s.value }}</div>
      <div class="stat-l">{{ s.labelKey | translate }}</div>
    </div>
  </div>

  <h2 class="sec-title home-quick-title">{{ 'HOME.QUICK_LINKS_TITLE' | translate }}</h2>
  <div class="home-quick-links">
    <div class="home-quick-link" *ngFor="let q of quickLinks" (click)="onQuickLink(q)">
      <div class="home-quick-link-icon">{{ q.icon }}</div>
      <div class="home-quick-link-title">{{ q.titleKey | translate }}</div>
      <div class="home-quick-link-subtitle">{{ q.subKey | translate }}</div>
    </div>
  </div>
</div>
