<div class="language-switcher">
  <button
    type="button"
    class="language-switcher-trigger"
    [attr.aria-label]="'COMMON.LANGUAGE' | translate"
    aria-haspopup="menu"
    [attr.aria-expanded]="isOpen">
    <span class="language-switcher-icon" aria-hidden="true">🌐</span>
    <span class="language-switcher-code" aria-hidden="true">{{ currentAbbr }}</span>
  </button>

  <div class="language-switcher-menu" role="menu" *ngIf="isOpen">
    <button
      type="button"
      role="menuitemradio"
      class="language-switcher-option"
      [attr.aria-checked]="i18n.currentLang === 'mr'"
      (click)="choose('mr')">
      <span class="language-switcher-option-label">{{ 'LANG.MR' | translate }}</span>
      <span class="language-switcher-option-check" aria-hidden="true" *ngIf="i18n.currentLang === 'mr'">✓</span>
    </button>
    <button
      type="button"
      role="menuitemradio"
      class="language-switcher-option"
      [attr.aria-checked]="i18n.currentLang === 'en'"
      (click)="choose('en')">
      <span class="language-switcher-option-label">{{ 'LANG.EN' | translate }}</span>
      <span class="language-switcher-option-check" aria-hidden="true" *ngIf="i18n.currentLang === 'en'">✓</span>
    </button>
  </div>
</div>
