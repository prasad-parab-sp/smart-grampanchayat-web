<div class="contact-banner" *ngIf="config.contactNumber">
  <span class="contact-banner-icon" aria-hidden="true">☎️</span>
  <div class="contact-banner-body">
    <div class="contact-banner-label">{{ config.contactLabel | translate }}</div>
    <a [href]="'tel:' + config.contactNumber" class="contact-banner-phone">
      {{ config.contactNumber }}
    </a>
  </div>
</div>
